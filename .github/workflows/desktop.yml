# Desktop builds: the open shell, packaged.
#
# Each job builds the Go sidecar for its own target triple (Tauri's
# externalBin naming), then runs `tauri build` with the shipping frontend —
# the webview pointed at the bundled sidecar on :8787, not dev scaffolding.
#
# Hermes itself is NOT bundled: the app starts the gateway from PATH and says
# so plainly in its log when it's missing. Bundling the Python runtime is its
# own track (see docs/architecture.md).
name: desktop

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "apps/desktop/**"
      - "core/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            sidecar: aular-core-x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            sidecar: aular-core-x86_64-pc-windows-msvc.exe
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Linux webview/bundler deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2

      - name: Build the Go sidecar
        working-directory: core
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o ../apps/desktop/src-tauri/binaries/${{ matrix.sidecar }} ./cmd/aular-core

      - name: Go tests
        working-directory: core
        run: go test ./...

      # The proof that Hermes actually installs and runs on this OS: a real
      # uv download, a managed Python, hermes-agent[all] from PyPI, and
      # `hermes --version`. This is the whole reason the Windows job exists.
      - name: Hermes bootstrap smoke test
        working-directory: core
        env:
          AULAR_SMOKE: "1"
        run: go test ./internal/infra/hermesboot/ -run TestInstallSmoke -v -timeout 25m

      - run: npm ci

      - name: Typecheck
        working-directory: apps/desktop
        run: npx tsc --noEmit

      - name: Tauri build (shipping frontend)
        working-directory: apps/desktop
        run: >
          npx tauri build
          --bundles ${{ matrix.bundles }}
          --config '{"build":{"beforeBuildCommand":"npm run build:shipping"}}'

      - uses: actions/upload-artifact@v4
        with:
          name: aular-desktop-${{ matrix.triple }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
